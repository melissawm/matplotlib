---
name: "Pull Request Labeler"
on:
  - pull_request_target

jobs:
  labeler:
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@77a4082b841706ac431479b7e2bb11216ffef250  # v6.0.1dev
        with:
          sync-labels: true
